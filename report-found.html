<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Report Found - Lost & Found</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <h1><a href="index.html">Lost & Found</a></h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="view-items.html">View Items</a>
        <a href="report-lost.html">Report Lost</a>
        <a href="report-found.html">Report Found</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>
  <main class="container form-wrap">
    <h2>Report a Found Item</h2>
    <form id="foundForm" class="form">
      <label>Your name <input name="finder_name" required></label>
      <label>Item name <input name="item_name" required></label>
      <label>Description <textarea name="description" rows="4"></textarea></label>
      <label>Where you found it <input name="location"></label>
      <label>Date found <input type="date" name="date_found"></label>
      <label>Contact info <input name="contact" required></label>
      <div class="form-actions">
        <button type="submit" class="btn">Submit</button>
        <a class="btn ghost" href="index.html">Cancel</a>
      </div>
    </form>
  </main>
  <footer class="footer">
    <div class="container">© <span id="year"></span> Lost & Found Portal</div>
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    document.getElementById('foundForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const finder_name = this.finder_name.value.trim();
      const item_name = this.item_name.value.trim();
      const contact = this.contact.value.trim();

      if (!finder_name || !item_name || !contact) {
        alert('Please fill required fields (Name, Item name, Contact).');
        return;
      }

      const entry = {
        type: 'found',
        finder_name,
        item_name,
        description: this.description.value.trim(),
        location: this.location.value.trim(),
        date_found: this.date_found.value,
        contact,
        submitted_at: new Date().toISOString()
      };

      const existing = JSON.parse(localStorage.getItem('foundItems') || '[]');
      existing.push(entry);
      localStorage.setItem('foundItems', JSON.stringify(existing));

      alert('Found item reported successfully!');
      this.reset();
      window.location.href = 'index.html';
    });
  </script>
</body>
</html>
