<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>View Items - Lost & Found</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <header class="topbar">
    <div class="container">
      <h1><a href="index.html">Lost & Found</a></h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="view-items.html">View Items</a>
        <a href="report-lost.html">Report Lost</a>
        <a href="report-found.html">Report Found</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>
  <main class="container">
    <h2>Lost Items</h2>
    <div class="cards" id="lostCards"></div>

    <h2>Found Items</h2>
    <div class="cards" id="foundCards"></div>
  </main>
  <footer class="footer">
    <div class="container">© <span id="year"></span> Lost & Found Portal</div>
  </footer>
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str || ''));
      return div.innerHTML;
    }

    function nl2br(str) {
      return escapeHtml(str).replace(/\n/g, '<br>');
    }

    function renderCards(containerId, items, type) {
      const container = document.getElementById(containerId);
      if (!items || items.length === 0) {
        container.innerHTML = type === 'lost'
          ? '<p>No lost items found.</p>'
          : '<p>No found items reported.</p>';
        return;
      }

      items.sort((a, b) => new Date(b.submitted_at) - new Date(a.submitted_at));

      container.innerHTML = items.slice(0, 100).map(r => {
        if (type === 'lost') {
          return `
            <div class="card">
              <h3>${escapeHtml(r.item_name)}</h3>
              <p><strong>Owner:</strong> ${escapeHtml(r.name)}</p>
              <p><strong>Where:</strong> ${escapeHtml(r.location)} — <strong>Date:</strong> ${escapeHtml(r.date_lost)}</p>
              <p>${nl2br(r.description)}</p>
              <p><strong>Contact:</strong> ${escapeHtml(r.contact)}</p>
            </div>`;
        } else {
          return `
            <div class="card">
              <h3>${escapeHtml(r.item_name)}</h3>
              <p><strong>Finder:</strong> ${escapeHtml(r.finder_name)}</p>
              <p><strong>Where:</strong> ${escapeHtml(r.location)} — <strong>Date:</strong> ${escapeHtml(r.date_found)}</p>
              <p>${nl2br(r.description)}</p>
              <p><strong>Contact:</strong> ${escapeHtml(r.contact)}</p>
            </div>`;
        }
      }).join('');
    }

    const lostItems  = JSON.parse(localStorage.getItem('lostItems')  || '[]');
    const foundItems = JSON.parse(localStorage.getItem('foundItems') || '[]');

    renderCards('lostCards',  lostItems,  'lost');
    renderCards('foundCards', foundItems, 'found');
  </script>
</body>
</html>
